<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 400px;
      margin: 0 auto;
      padding: 40px 24px;
      background: #f5f5f5;
    }
    h1 { color: #3730a3; font-size: 24px; margin-bottom: 8px; }
    p  { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; color: #374151; margin-bottom: 4px; }
    input {
      width: 100%; padding: 10px 12px; margin-bottom: 16px;
      border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px;
    }
    input:focus { outline: none; border-color: #6366f1; }
    button {
      width: 100%; padding: 12px;
      background: #6366f1; color: white;
      border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .note {
      margin-top: 16px; padding: 12px;
      background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
      font-size: 12px; color: #92400e;
    }
  </style>
</head>
<body>
  <h1>自社アカウント ログイン</h1>
  <p>デモ用ログインページです</p>

  <label for="email">メールアドレス</label>
  <input type="email" id="email" value="demo@example.com" placeholder="メールアドレス">

  <label for="password">パスワード</label>
  <input type="password" id="password" value="password" placeholder="パスワード">

  <button onclick="login()">ログイン</button>

  <div class="note">
    デモ: 任意の値を入力してログインボタンを押すと、JS Bridge 経由でトークンをアプリに渡します。
  </div>

  <script>
    function login() {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        alert('メールアドレスを入力してください');
        return;
      }
      // Flutter JS Bridge (AuthBridge チャンネル) にトークンを送信
      const token = 'mock_token_' + Date.now();
      AuthBridge.postMessage(JSON.stringify({ token: token }));
    }
  </script>
</body>
</html>
