<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; height: 100vh; margin: 0;
           background: #f5f5f5; }
    h1 { color: #333; }
    button { padding: 12px 32px; font-size: 16px; border: none; border-radius: 8px;
             cursor: pointer; margin: 8px; }
    .login-btn { background: #4CAF50; color: white; }
    .oauth-btn { background: #1565C0; color: white; }
  </style>
</head>
<body>
  <h1>TODO App</h1>
  <button class="login-btn" onclick="handleLogin()">ログイン</button>
  <button class="oauth-btn" onclick="handleOAuth()">OAuth でログイン</button>
  <script>
    function handleLogin() {
      FlutterAuth.postMessage(JSON.stringify({ type: 'login', token: 'mock_token_from_js' }));
    }
    function handleOAuth() {
      FlutterAuth.postMessage(JSON.stringify({ type: 'oauth' }));
    }
  </script>
</body>
</html>
