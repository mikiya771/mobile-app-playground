<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認可</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; height: 100vh; margin: 0;
           background: #e3f2fd; }
    h1 { color: #1565C0; }
    button { padding: 12px 32px; font-size: 16px; background: #1565C0;
             color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>OAuth 認可</h1>
  <p>TODO App へのアクセスを許可しますか？</p>
  <button onclick="authorize()">許可する</button>
  <script>
    function authorize() {
      // todoapp://callback?code=AUTH_CODE でアプリに戻る
      window.location.href = 'todoapp://callback?code=mock_auth_code_12345';
    }
  </script>
</body>
</html>
