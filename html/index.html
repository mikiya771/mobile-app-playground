<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Web</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #333; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    a { color: #1976d2; }
    .external { color: #c62828; }
  </style>
</head>
<body>
  <h1>Todo Web</h1>
  <div class="card">
    <h2>ローカルページ（ホワイトリスト内）</h2>
    <ul>
      <li><a href="/todos/1">Todo #1</a></li>
      <li><a href="/todos/2">Todo #2</a></li>
      <li><a href="/">トップへ戻る</a></li>
    </ul>
  </div>
  <div class="card">
    <h2>外部リンク（ホワイトリスト外）</h2>
    <p>以下のリンクは外部ブラウザで開かれます。</p>
    <ul>
      <li><a class="external" href="https://flutter.dev">flutter.dev</a></li>
      <li><a class="external" href="https://pub.dev">pub.dev</a></li>
    </ul>
  </div>
</body>
</html>
