<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ログイン</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #333; }
    label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #1976d2; }
    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }
    .btn-primary { background: #1976d2; color: white; }
    .btn-primary:active { background: #1565c0; }
    .btn-oauth { background: white; color: #444; border: 1px solid #ddd; }
    .btn-oauth:active { background: #f5f5f5; }
    .divider { text-align: center; color: #aaa; font-size: 0.85rem; margin: 0.5rem 0 1rem; }
    #error { color: #c62828; font-size: 0.85rem; margin-top: 0.25rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ログイン</h1>
    <label for="username">ユーザー名</label>
    <input id="username" type="text" placeholder="user" autocomplete="username" />
    <label for="password">パスワード</label>
    <input id="password" type="password" placeholder="password" autocomplete="current-password" />
    <button class="btn-primary" onclick="handleLogin()">ログイン</button>
    <div id="error"></div>
    <div class="divider">または</div>
    <button class="btn-oauth" onclick="handleOAuth()">OAuth でログイン（モック）</button>
  </div>

  <script>
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('ユーザー名とパスワードを入力してください');
        return;
      }

      if (username === 'user' && password === 'password') {
        const token = 'dummy-token-' + Date.now();
        FlutterAuth.postMessage(JSON.stringify({ type: 'login', token: token }));
      } else {
        showError('ユーザー名またはパスワードが違います');
      }
    }

    function handleOAuth() {
      FlutterAuth.postMessage(JSON.stringify({ type: 'oauth' }));
    }

    function showError(msg) {
      document.getElementById('error').textContent = msg;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
