name: flutter_module
description: "Flutter Add-to-App module — single shared engine, StatefulShellRoute with 2 branches (Search / Shop)"

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # Navigation — StatefulShellRoute.indexedStack drives the 2 Flutter branches.
  # Native owns the tab bar and drives branch switches via MethodChannel.
  go_router: ^14.3.0
  # Shared state — demonstrates that both branches share one Dart isolate/memory.
  flutter_riverpod: ^2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  module:
    androidX: true
    androidPackage: com.example.flutter_module
    iosBundleIdentifier: com.example.flutterModule
